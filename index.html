<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SarkariAlert — ChatGPT Powered</title>

<style>
/* KEEPING YOUR UI CLEAN BUT SHORTENED */
body {
  font-family: Arial;
  background:#0c1730;
  color:#fff;
  margin:0;
}

header {
  background:#111e40;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

button {
  padding:10px;
  background:gold;
  border:none;
  cursor:pointer;
}

.jobs {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:#172454;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  <h2>SarkariAlert (ChatGPT Powered)</h2>
  <button onclick="fetchJobs()">Refresh</button>
</header>

<div id="status" style="padding:10px;color:orange;"></div>
<div class="jobs" id="jobs"></div>

<script>

let allJobs = [];

/* ============================= */
/* 🔥 CHATGPT API STRUCTURE MOCK */
/* ============================= */

async function fetchJobs() {

  document.getElementById("status").innerText = "Fetching from ChatGPT...";

  // ⚠️ Replace this with backend later
  const chatgptResponse = await simulateChatGPT();

  allJobs = chatgptResponse;

  renderJobs(allJobs);

  document.getElementById("status").innerText = "Updated successfully";
}

/* ============================= */
/* 🔥 SIMULATED CHATGPT RESPONSE */
/* ============================= */

function simulateChatGPT() {

  return new Promise(resolve => {
    setTimeout(() => {
      resolve([
        {
          title:"SSC CGL 2026",
          organization:"SSC",
          category:"Central",
          vacancies:7500,
          qualification:"Graduate",
          location:"All India",
          lastDate:"2026-06-15",
          salary:"₹25,500 – ₹81,100",
          applyLink:"https://ssc.nic.in"
        },
        {
          title:"IBPS PO 2026",
          organization:"IBPS",
          category:"Banking",
          vacancies:4000,
          qualification:"Graduate",
          location:"All India",
          lastDate:"2026-06-10",
          salary:"₹52,000/month",
          applyLink:"https://ibps.in"
        },
        {
          title:"Indian Army Agniveer",
          organization:"Indian Army",
          category:"Defence",
          vacancies:25000,
          qualification:"10th/12th",
          location:"All India",
          lastDate:"2026-05-30",
          salary:"₹30,000/month",
          applyLink:"https://joinindianarmy.nic.in"
        }
      ]);
    },1500);
  });
}

/* ============================= */
/* RENDER JOBS */
/* ============================= */

function renderJobs(jobs) {
  const container = document.getElementById("jobs");
  container.innerHTML = "";

  jobs.forEach(job => {

    let deadline = job.lastDate;
    const d = new Date(job.lastDate);

    if(!isNaN(d)) {
      const diff = Math.ceil((d - Date.now()) / 86400000);
      if(diff <= 0) deadline = "Expired";
      else deadline = diff + " days left";
    }

    container.innerHTML += `
      <div class="card">
        <h3>${job.title}</h3>
        <p>🏢 ${job.organization}</p>
        <p>📍 ${job.location}</p>
        <p>🎓 ${job.qualification}</p>
        <p>💰 ${job.salary}</p>
        <p>⏰ ${deadline}</p>
        <a href="${job.applyLink}" target="_blank" style="color:gold">Apply →</a>
      </div>
    `;
  });
}

/* AUTO LOAD */
fetchJobs();

</script>

</body>
</html>
