<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sarkari Jobs Alert</title>

<style>
body {
  font-family: Arial;
  background:#0c1730;
  color:#fff;
}
header {
  padding:15px;
  background:#111e40;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.jobs {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:15px;
  padding:20px;
}
.card {
  background:#172454;
  padding:15px;
  border-radius:10px;
}
a { color:gold; }
select {
  margin-left:10px;
  padding:5px;
}
</style>
</head>

<body>

<header>
  <h2>🇮🇳 SarkariAlert (Hybrid Mode)</h2>
  <div>
    <button onclick="loadJobs()">Refresh</button>
    <select id="limitSelect" onchange="loadJobs()">
      <option value="10">10 jobs per source</option>
      <option value="20">20 jobs per source</option>
      <option value="50">50 jobs per source</option>
      <option value="all">All jobs</option>
    </select>
  </div>
</header>

<div id="status" style="padding:10px;color:orange;"></div>
<div class="jobs" id="jobs"></div>

<script>
let jobs = [];

/* Helper: apply limit */
function applyLimit(items, limit) {
  if (limit === "all") return [...items];
  return [...items].slice(0, parseInt(limit));
}

/* ========================= */
/* FETCH FREEJOBALERT RSS */
/* ========================= */
async function fetchRSS(limit) {
  const res = await fetch("https://api.allorigins.win/get?url=" +
    encodeURIComponent("https://www.freejobalert.com/feed/"));
  const data = await res.json();
  const parser = new DOMParser();
  const xml = parser.parseFromString(data.contents, "text/xml");
  const items = xml.querySelectorAll("item");

  return applyLimit(items, limit).map(item => ({
    title: item.querySelector("title").textContent,
    source: "FreeJobAlert",
    date: item.querySelector("pubDate").textContent,
    link: item.querySelector("link").textContent
  }));
}

/* ========================= */
/* FETCH SARKARI RESULT (proxy) */
/* ========================= */
async function fetchSarkariResult(limit) {
  try {
    const res = await fetch("https://api.allorigins.win/get?url=" +
      encodeURIComponent("https://www.sarkariresult.com/"));
    const data = await res.json();
    const parser = new DOMParser();
    const doc = parser.parseFromString(data.contents, "text/html");

    let jobs = [];
    doc.querySelectorAll("a").forEach(a => {
      const text = a.textContent.trim();
      const href = a.href;
      if (text.length > 20 && text.toLowerCase().includes("apply")) {
        jobs.push({
          title: text,
          source: "SarkariResult",
          date: new Date(),
          link: href
        });
      }
    });

    return applyLimit(jobs, limit);
  } catch {
    return [];
  }
}

/* ========================= */
/* FETCH TIMESJOBS RSS */
/* ========================= */
async function fetchTimesJobs(limit) {
  try {
    const res = await fetch("https://api.allorigins.win/get?url=" +
      encodeURIComponent("https://www.timesjobs.com/rssfeed/"));
    const data = await res.json();
    const parser = new DOMParser();
    const xml = parser.parseFromString(data.contents, "text/xml");
    const items = xml.querySelectorAll("item");

    return applyLimit(items, limit).map(item => ({
      title: item.querySelector("title").textContent,
      source: "TimesJobs",
      date: item.querySelector("pubDate").textContent,
      link: item.querySelector("link").textContent
    }));
  } catch {
    return [];
  }
}

/* ========================= */
/* FETCH FRESHERSWORLD RSS */
/* ========================= */
async function fetchFreshersWorld(limit) {
  try {
    const res = await fetch("https://api.allorigins.win/get?url=" +
      encodeURIComponent("https://www.freshersworld.com/rss.xml"));
    const data = await res.json();
    const parser = new DOMParser();
    const xml = parser.parseFromString(data.contents, "text/xml");
    const items = xml.querySelectorAll("item");

    return applyLimit(items, limit).map(item => ({
      title: item.querySelector("title").textContent,
      source: "FreshersWorld",
      date: item.querySelector("pubDate").textContent,
      link: item.querySelector("link").textContent
    }));
  } catch {
    return [];
  }
}

/* ========================= */
/* LOAD ALL SOURCES */
/* ========================= */
async function loadJobs() {
  const limit = document.getElementById("limitSelect").value;
  document.getElementById("status").innerText =
    "Fetching live jobs from multiple sources...";

  try {
    const [rss, sr, tj, fw] = await Promise.all([
      fetchRSS(limit),
      fetchSarkariResult(limit),
      fetchTimesJobs(limit),
      fetchFreshersWorld(limit)
    ]);

    jobs = [...rss, ...sr, ...tj, ...fw];
    renderJobs(jobs);

    document.getElementById("status").innerText =
      `Loaded ${jobs.length} jobs`;
  } catch {
    document.getElementById("status").innerText = "Error loading jobs";
  }
}

/* ========================= */
/* RENDER JOB CARDS */
/* ========================= */
function renderJobs(list) {
  const container = document.getElementById("jobs");
  container.innerHTML = "";

  list.forEach(job => {
    container.innerHTML += `
      <div class="card">
        <h3>${job.title}</h3>
        <p>🏢 ${job.source}</p>
        <p>📅 ${new Date(job.date).toDateString()}</p>
        <a href="${job.link}" target="_blank">View →</a>
      </div>
    `;
  });
}

loadJobs();
</script>
</body>
</html>
