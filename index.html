<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇮🇳 Sarkari Jobs Alert - Live Updates</title>

<style>
* { box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #0c1730 0%, #1a2a5e 100%);
  color: #fff;
  margin: 0;
  padding-bottom: 80px;
  min-height: 100vh;
}
header {
  padding: 20px;
  background: rgba(17, 30, 64, 0.95);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.logo {
  font-size: 24px;
  font-weight: bold;
  background: linear-gradient(45deg, gold, #ffd700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.refresh-btn {
  background: linear-gradient(45deg, #ff6b35, #f7931e);
  border: none;
  padding: 12px 24px;
  border-radius: 25px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s ease;
}
.refresh-btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(255,107,53,0.4); }
.refresh-btn:active { transform: scale(0.98); }

#status {
  padding: 15px 20px;
  text-align: center;
  font-weight: bold;
  background: rgba(255,193,7,0.1);
  border-radius: 10px;
  margin: 20px;
}

.jobs {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
  padding: 20px;
  max-width: 1400px;
  margin: 0 auto;
}
.card {
  background: rgba(23, 36, 84, 0.9);
  padding: 20px;
  border-radius: 15px;
  border: 1px solid rgba(255,193,7,0.2);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, gold, #ff6b35);
}
.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 30px rgba(0,0,0,0.4);
  background: rgba(23, 36, 84, 1);
}
.card h3 {
  margin: 0 0 12px 0;
  font-size: 16px;
  line-height: 1.4;
  color: #fff;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-meta {
  font-size: 14px;
  opacity: 0.8;
  margin: 10px 0;
}
.job-link {
  display: inline-block;
  background: linear-gradient(45deg, #ff6b35, #f7931e);
  color: white;
  padding: 8px 16px;
  border-radius: 20px;
  text-decoration: none;
  font-weight: bold;
  font-size: 14px;
  transition: all 0.3s ease;
  margin-top: 10px;
}
.job-link:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 15px rgba(255,107,53,0.4);
}

footer {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: rgba(17, 30, 64, 0.95);
  backdrop-filter: blur(10px);
  color: #ccc;
  text-align: center;
  padding: 15px;
  font-size: 14px;
  border-top: 1px solid rgba(255,193,7,0.2);
}

.loading { animation: pulse 1.5s infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

@media (max-width: 768px) {
  .jobs { grid-template-columns: 1fr; padding: 10px; }
  header { flex-direction: column; gap: 15px; }
}
</style>
</head>

<body>
<header>
  <div class="logo">🇮🇳 SarkariAlert Pro</div>
  <button class="refresh-btn" onclick="loadJobs()">🔄 Refresh Jobs</button>
</header>

<div id="status" class="loading">Loading latest government jobs...</div>
<div class="jobs" id="jobs"></div>

<footer>
  © SH1VAM 2026 | Sarkari Jobs Alert — Live Updates Every Minute
</footer>

<script>
let jobs = [];
let lastUpdate = null;

// ✅ WORKING RSS FEEDS (Reliable sources)
const SOURCES = [
  {
    name: "FreeJobAlert",
    url: "https://www.freejobalert.com/feed/",
    icon: "🚀"
  },
  {
    name: "SarkariResult", 
    url: "https://www.sarkariresult.com/feed/",
    icon: "📋"
  },
  {
    name: "FreshersWorld",
    url: "https://www.freshersworld.com/rss.xml",
    icon: "🎓"
  },
  {
    name: "Naukri Govt",
    url: "https://www.naukri.com/government-jobs/rss",
    icon: "🏛️"
  },
  {
    name: "Indeed Govt",
    url: "https://in.indeed.com/rss?q=government&l=India",
    icon: "🔍"
  }
];

// Proxy to bypass CORS
const CORS_PROXY = "https://api.allorigins.win/get?url=";

// Parse RSS/XML feed
async function parseRSS(feedUrl) {
  try {
    const response = await fetch(CORS_PROXY + encodeURIComponent(feedUrl));
    const data = await response.json();
    const parser = new DOMParser();
    const xml = parser.parseFromString(data.contents, "text/xml");
    
    // Handle parsing errors
    const parserError = xml.querySelector("parsererror");
    if (parserError) throw new Error("XML Parse Error");
    
    const items = xml.querySelectorAll("item");
    return Array.from(items).map(item => {
      const title = item.querySelector("title")?.textContent?.trim() || "No Title";
      const link = item.querySelector("link")?.textContent?.trim() || "#";
      const pubDate = item.querySelector("pubDate")?.textContent || new Date().toISOString();
      
      // Filter relevant jobs
      if (title.toLowerCase().includes("govt") || 
          title.toLowerCase().includes("government") ||
          title.toLowerCase().includes("sarkari") ||
          title.toLowerCase().includes("apply")) {
        return {
          title: title.substring(0, 100),
          link: link,
          date: pubDate,
          source: feedUrl.includes("freejobalert") ? "FreeJobAlert" : 
                  feedUrl.includes("sarkariresult") ? "SarkariResult" :
                  feedUrl.includes("freshersworld") ? "FreshersWorld" : "Jobs"
        };
      }
      return null;
    }).filter(Boolean);
  } catch (error) {
    console.warn(`Failed to fetch ${feedUrl}:`, error);
    return [];
  }
}

// Load jobs from all sources
async function loadJobs() {
  const statusEl = document.getElementById("status");
  statusEl.textContent = "🔄 Fetching live jobs from 5+ sources...";
  statusEl.classList.add("loading");
  
  try {
    // Fetch all sources in parallel
    const promises = SOURCES.map(source => parseRSS(source.url));
    const allJobs = await Promise.all(promises);
    
    // Flatten and deduplicate
    jobs = allJobs.flat();
    
    // Remove duplicates based on title + source
    jobs = jobs.filter((job, index, self) => 
      index === self.findIndex(t => 
        t.title === job.title && t.source === job.source
      )
    );
    
    // Sort by date (newest first)
    jobs.sort((a, b) => new Date(b.date) - new Date(a.date));
    
    // Limit to top 50 jobs
    jobs = jobs.slice(0, 50);
    
    renderJobs(jobs);
    lastUpdate = new Date().toLocaleTimeString();
    
    statusEl.textContent = `✅ Loaded ${jobs.length} fresh jobs | Last Update: ${lastUpdate}`;
    statusEl.classList.remove("loading");
    
  } catch (error) {
    statusEl.textContent = "❌ Error loading jobs. Try refreshing!";
    statusEl.classList.remove("loading");
    console.error("Load jobs error:", error);
  }
}

// Render job cards
function renderJobs(jobList) {
  const container = document.getElementById("jobs");
  
  if (jobList.length === 0) {
    container.innerHTML = `
      <div style="grid-column: 1/-1; text-align: center; padding: 40px; opacity: 0.7;">
        <h3>📭 No jobs found</h3>
        <p>Try refreshing for latest updates</p>
      </div>
    `;
    return;
  }
  
  container.innerHTML = jobList.map(job => `
    <div class="card">
      <h3>${job.title}</h3>
      <div class="card-meta">
        <span>🏢 ${job.source}</span> | 
        <span>📅 ${new Date(job.date).toLocaleDateString('en-IN')}</span>
      </div>
      <a href="${job.link}" class="job-link" target="_blank" rel="noopener">
        🔗 View & Apply →
      </a>
    </div>
  `).join('');
}

// Auto-refresh every 5 minutes
setInterval(loadJobs, 5 * 60 * 1000);

// Initial load
loadJobs();
</script>
</body>
</html>
