<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SarkariAlert Live Jobs</title>

<style>
body {
  font-family: Arial;
  background:#0c1730;
  color:#fff;
}

header {
  padding:15px;
  background:#111e40;
  display:flex;
  justify-content:space-between;
}

.jobs {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:#172454;
  padding:15px;
  border-radius:10px;
}

a { color:gold; }
</style>
</head>

<body>

<header>
  <h2>🇮🇳 SarkariAlert (Live Jobs)</h2>
  <button onclick="fetchJobs()">Refresh</button>
</header>

<div id="status" style="padding:10px;color:orange;"></div>
<div class="jobs" id="jobs"></div>

<script>

/* ========================= */
/* 🔥 REAL JOB FETCH */
/* ========================= */

async function fetchJobs() {

  document.getElementById("status").innerText = "Fetching live jobs...";

  try {

    // 🔥 Using RSS feed (CORS friendly proxy)
    const res = await fetch("https://api.allorigins.win/get?url=" +
      encodeURIComponent("https://www.freejobalert.com/feed/"));

    const data = await res.json();

    const parser = new DOMParser();
    const xml = parser.parseFromString(data.contents, "text/xml");

    const items = xml.querySelectorAll("item");

    let jobsHTML = "";

    items.forEach((item, index) => {

      if(index > 20) return; // limit 20+

      const title = item.querySelector("title").textContent;
      const link = item.querySelector("link").textContent;
      const date = item.querySelector("pubDate").textContent;

      jobsHTML += `
        <div class="card">
          <h3>${title}</h3>
          <p>📅 ${date}</p>
          <a href="${link}" target="_blank">View Details →</a>
        </div>
      `;
    });

    document.getElementById("jobs").innerHTML = jobsHTML;
    document.getElementById("status").innerText = "Live jobs loaded";

  } catch(err) {
    document.getElementById("status").innerText = "Error loading jobs";
  }
}

/* AUTO LOAD */
fetchJobs();

</script>

</body>
</html>
