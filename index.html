<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sarkari Jobs Alert</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  

<style>
body {
  font-family: Arial;
  background:#0c1730;
  color:#fff;
  margin:0;
  padding-bottom:80px; /* space for footer */
}
header {
  padding:15px;
  background:#111e40;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.jobs {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:15px;
  padding:20px;
}
.card {
  background:#172454;
  padding:15px;
  border-radius:10px;
}
a { color:gold; }
footer {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#111e40;
  color:#fff;
  text-align:center;
  padding:10px;
  font-size:14px;
}
</style>
</head>

<body>

<header>
  <h2>🇮🇳 SarkariAlert (Hybrid Mode)</h2>
  <button onclick="loadJobs()">Refresh</button>
</header>

<div id="status" style="padding:10px;color:orange;"></div>
<div class="jobs" id="jobs"></div>

<footer>
  © SH1VAM 2026 Sarkari Jobs — All Rights Reserved
</footer>

<script>
let jobs = [];

/* FreeJobAlert RSS */
async function fetchFreeJobAlert() {
  const res = await fetch("https://api.allorigins.win/get?url=" +
    encodeURIComponent("https://www.freejobalert.com/feed/"));
  const data = await res.json();
  const parser = new DOMParser();
  const xml = parser.parseFromString(data.contents, "text/xml");
  const items = xml.querySelectorAll("item");

  return [...items].map(item => ({
    title: item.querySelector("title").textContent,
    source: "FreeJobAlert",
    date: item.querySelector("pubDate").textContent,
    link: item.querySelector("link").textContent
  }));
}

/* SarkariResult */
async function fetchSarkariResult() {
  try {
    const res = await fetch("https://api.allorigins.win/get?url=" +
      encodeURIComponent("https://www.sarkariresult.com/"));
    const data = await res.json();
    const parser = new DOMParser();
    const doc = parser.parseFromString(data.contents, "text/html");

    let jobs = [];
    doc.querySelectorAll("a").forEach(a => {
      const text = a.textContent.trim();
      const href = a.href;
      if (text.length > 20 && text.toLowerCase().includes("apply")) {
        jobs.push({
          title: text,
          source: "SarkariResult",
          date: new Date(),
          link: href
        });
      }
    });
    return jobs;
  } catch {
    return [];
  }
}

/* TimesJobs RSS */
async function fetchTimesJobs() {
  try {
    const res = await fetch("https://api.allorigins.win/get?url=" +
      encodeURIComponent("https://www.timesjobs.com/rssfeed/"));
    const data = await res.json();
    const parser = new DOMParser();
    const xml = parser.parseFromString(data.contents, "text/xml");
    const items = xml.querySelectorAll("item");

    return [...items].map(item => ({
      title: item.querySelector("title").textContent,
      source: "TimesJobs",
      date: item.querySelector("pubDate").textContent,
      link: item.querySelector("link").textContent
    }));
  } catch {
    return [];
  }
}

/* FreshersWorld RSS */
async function fetchFreshersWorld() {
  try {
    const res = await fetch("https://api.allorigins.win/get?url=" +
      encodeURIComponent("https://www.freshersworld.com/rss.xml"));
    const data = await res.json();
    const parser = new DOMParser();
    const xml = parser.parseFromString(data.contents, "text/xml");
    const items = xml.querySelectorAll("item");

    return [...items].map(item => ({
      title: item.querySelector("title").textContent,
      source: "FreshersWorld",
      date: item.querySelector("pubDate").textContent,
      link: item.querySelector("link").textContent
    }));
  } catch {
    return [];
  }
}

/* Load all sources */
async function loadJobs() {
  document.getElementById("status").innerText =
    "Fetching live jobs from multiple sources...";
  try {
    const [fja, sr, tj, fw] = await Promise.all([
      fetchFreeJobAlert(),
      fetchSarkariResult(),
      fetchTimesJobs(),
      fetchFreshersWorld()
    ]);
    jobs = [...fja, ...sr, ...tj, ...fw];
    renderJobs(jobs);
    document.getElementById("status").innerText =
      `Loaded ${jobs.length} jobs`;
  } catch {
    document.getElementById("status").innerText = "Error loading jobs";
  }
}

/* Render job cards */
function renderJobs(list) {
  const container = document.getElementById("jobs");
  container.innerHTML = "";
  list.forEach(job => {
    container.innerHTML += `
      <div class="card">
        <h3>${job.title}</h3>
        <p>🏢 ${job.source}</p>
        <p>📅 ${new Date(job.date).toDateString()}</p>
        <a href="${job.link}" target="_blank">View →</a>
      </div>
    `;
  });
}

loadJobs();
</script>

</body>
</html>
