<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sarkari Jobs Alert</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background:#0c1730;
  color:#fff;
  margin:0;
  padding-bottom:80px;
}
header {
  padding:15px;
  background:#111e40;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
}
header button {
  background:gold;
  color:#0c1730;
  border:none;
  padding:8px 16px;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}
header button:hover { opacity:0.9; }
header button:disabled { opacity:0.5; cursor:not-allowed; }
.jobs {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:15px;
  padding:20px;
}
.card {
  background:#172454;
  padding:15px;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.card h3 { margin:0; font-size:16px; line-height:1.4; }
.card p { margin:0; font-size:14px; opacity:0.8; }
a { color:gold; text-decoration:none; }
a:hover { text-decoration:underline; }
.badge {
  display:inline-block;
  background:#0c1730;
  padding:2px 8px;
  border-radius:4px;
  font-size:12px;
}
footer {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#111e40;
  color:#fff;
  text-align:center;
  padding:10px;
  font-size:14px;
}
#status { padding:10px 20px; color:orange; min-height:20px; }
.loader { color:gold; }
</style>
</head>

<body>
<header>
  <h2>🇮🇳 SarkariAlert (Hybrid Mode)</h2>
  <button id="refreshBtn" onclick="loadJobs()">Refresh Jobs</button>
</header>

<div id="status"></div>
<div class="jobs" id="jobs"></div>

<footer>
  © SH1VAM 2026 Sarkari Jobs — All Rights Reserved
</footer>

<script>
const PROXY = "https://api.allorigins.win/get?url=";

function sanitize(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}

function formatDate(dateStr) {
  if (!dateStr) return 'Recently Posted';
  const d = new Date(dateStr);
  return isNaN(d) ? 'Recently Posted' : d.toDateString();
}

async function fetchRSS(url, source) {
  try {
    const res = await fetch(PROXY + encodeURIComponent(url));
    const data = await res.json();
    const parser = new DOMParser();
    const xml = parser.parseFromString(data.contents, "text/xml");
    
    if (xml.querySelector("parsererror")) throw new Error("Invalid XML");
    
    const items = xml.querySelectorAll("item");
    return [...items].slice(0, 20).map(item => ({
      title: item.querySelector("title")?.textContent?.trim() || "No Title",
      source: source,
      date: item.querySelector("pubDate")?.textContent,
      link: item.querySelector("link")?.textContent?.trim()
    })).filter(job => job.link);
  } catch (e) {
    console.error(`${source} failed:`, e);
    return [];
  }
}

async function fetchSarkariResult() {
  try {
    const res = await fetch(PROXY + encodeURIComponent("https://www.sarkariresult.com/"));
    const data = await res.json();
    const parser = new DOMParser();
    const doc = parser.parseFromString(data.contents, "text/html");
    
    let jobs = [];
    const links = doc.querySelectorAll("#post a, .post a");
    
    links.forEach(a => {
      const text = a.textContent.trim();
      const href = a.href;
      // Filter for actual job posts
      if (text.length > 15 && 
          href.includes("sarkariresult.com") && 
          /online|form|apply|admit|result|answer|key/i.test(text)) {
        jobs.push({
          title: text,
          source: "SarkariResult",
          date: null,
          link: href
        });
      }
    });
    return jobs.slice(0, 20);
  } catch (e) {
    console.error("SarkariResult failed:", e);
    return [];
  }
}

function deduplicateJobs(jobs) {
  const seen = new Set();
  return jobs.filter(job => {
    const key = job.title.toLowerCase().replace(/\s+/g, ' ').trim();
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

async function loadJobs() {
  const statusEl = document.getElementById("status");
  const btn = document.getElementById("refreshBtn");
  const container = document.getElementById("jobs");
  
  btn.disabled = true;
  statusEl.innerHTML = '<span class="loader">Fetching live jobs from multiple sources...</span>';
  container.innerHTML = "";
  
  const sources = [
    fetchRSS("https://www.freejobalert.com/feed/", "FreeJobAlert"),
    fetchSarkariResult(),
    fetchRSS("https://www.timesjobs.com/rssfeed/", "TimesJobs"),
    fetchRSS("https://www.freshersworld.com/rss.xml", "FreshersWorld")
  ];
  
  // Use allSettled so one failure doesn't kill everything
  const results = await Promise.allSettled(sources);
  let allJobs = results
    .filter(r => r.status === 'fulfilled')
    .flatMap(r => r.value);
  
  allJobs = deduplicateJobs(allJobs);
  
  // Sort by date if available, newest first
  allJobs.sort((a, b) => {
    if (!a.date) return 1;
    if (!b.date) return -1;
    return new Date(b.date) - new Date(a.date);
  });
  
  renderJobs(allJobs);
  
  const failedCount = results.filter(r => r.status === 'rejected').length;
  statusEl.innerText = `Loaded ${allJobs.length} jobs` + 
    (failedCount ? ` • ${failedCount} source(s) failed` : '');
  btn.disabled = false;
}

function renderJobs(list) {
  const container = document.getElementById("jobs");
  
  if (!list.length) {
    container.innerHTML = `<p style="grid-column:1/-1;text-align:center;opacity:0.7">No jobs found. Try refreshing.</p>`;
    return;
  }
  
  container.innerHTML = list.map(job => `
    <div class="card">
      <h3>${sanitize(job.title)}</h3>
      <p><span class="badge">🏢 ${sanitize(job.source)}</span></p>
      <p>📅 ${formatDate(job.date)}</p>
      <a href="${sanitize(job.link)}" target="_blank" rel="noopener noreferrer">Apply / View →</a>
    </div>
  `).join('');
}

// Load on page start
loadJobs();
</script>
</body>
</html>
