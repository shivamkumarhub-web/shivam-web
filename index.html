<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SarkariAlert — Live Government Jobs</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0c1730;
  color: #fff;
  margin: 0;
}

/* HEADER */
header {
  padding: 15px;
  background: #111e40;
  display: flex;
  justify-content: space-between;
}

h1 { color: gold; }

/* BUTTON */
button {
  padding: 10px;
  background: gold;
  border: none;
  cursor: pointer;
}

/* JOB GRID */
.jobs {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #172454;
  padding: 15px;
  border-radius: 10px;
}

.title { font-weight: bold; margin-bottom: 10px; }

.meta { font-size: 14px; color: #ccc; }

.apply {
  margin-top: 10px;
  display: inline-block;
  color: gold;
}
</style>
</head>

<body>

<header>
  <h1>SarkariAlert</h1>
  <button onclick="loadJobs()">Refresh Jobs</button>
</header>

<div class="jobs" id="jobs"></div>

<script>

/* ✅ DEMO JOB DATA (NO API REQUIRED) */
const jobsData = [
{
title:"SSC CGL 2026",
organization:"SSC",
category:"Central",
vacancies:7500,
qualification:"Graduate",
location:"All India",
lastDate:"2026-06-15",
salary:"₹25,500 – ₹81,100",
applyLink:"https://ssc.nic.in"
},
{
title:"IBPS PO 2026",
organization:"IBPS",
category:"Banking",
vacancies:4500,
qualification:"Graduate",
location:"All India",
lastDate:"2026-06-10",
salary:"₹52,000/month",
applyLink:"https://ibps.in"
},
{
title:"Indian Army Agniveer",
organization:"Indian Army",
category:"Defence",
vacancies:25000,
qualification:"10th/12th",
location:"All India",
lastDate:"2026-05-30",
salary:"₹30,000/month",
applyLink:"https://joinindianarmy.nic.in"
},
{
title:"RRB NTPC",
organization:"Railway",
category:"Railway",
vacancies:10000,
qualification:"12th/Graduate",
location:"All India",
lastDate:"2026-06-20",
salary:"₹35,000/month",
applyLink:"https://rrbcdg.gov.in"
}
];

/* LOAD JOBS */
function loadJobs() {
  const container = document.getElementById("jobs");
  container.innerHTML = "";

  jobsData.forEach(job => {

    let deadlineText = job.lastDate;
    const dl = new Date(job.lastDate);

    if (!isNaN(dl)) {
      const diff = Math.ceil((dl - Date.now()) / 86400000);
      if (diff <= 0) deadlineText = "Deadline Passed";
      else deadlineText = diff + " days left";
    }

    container.innerHTML += `
      <div class="card">
        <div class="title">${job.title}</div>
        <div class="meta">🏢 ${job.organization}</div>
        <div class="meta">📍 ${job.location}</div>
        <div class="meta">🎓 ${job.qualification}</div>
        <div class="meta">💰 ${job.salary}</div>
        <div class="meta">📅 ${deadlineText}</div>
        <a class="apply" href="${job.applyLink}" target="_blank">Apply Now →</a>
      </div>
    `;
  });
}

/* AUTO LOAD */
window.onload = loadJobs;

</script>

</body>
</html>
