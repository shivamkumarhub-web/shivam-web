<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇮🇳 ALL-IN-ONE Sarkari Jobs (15+ Sources)</title>
<style>
/* [Same beautiful CSS as before - keeping it short] */
* { box-sizing: border-box; }
body { 
  font-family: 'Segoe UI', sans-serif; 
  background: linear-gradient(135deg, #0c1730 0%, #1a2a5e 100%);
  color: #fff; margin: 0; padding-bottom: 80px;
}
header { 
  padding: 20px; background: rgba(17,30,64,0.95); 
  display: flex; justify-content: space-between; align-items: center;
}
.logo { 
  font-size: 24px; font-weight: bold; 
  background: linear-gradient(45deg, gold, orange); 
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.refresh-btn { 
  background: linear-gradient(45deg, #ff6b35, orange); 
  border: none; padding: 12px 24px; border-radius: 25px; 
  color: white; font-weight: bold; cursor: pointer;
}
#status { padding: 15px 20px; text-align: center; font-weight: bold; background: rgba(255,193,7,0.1); border-radius: 10px; margin: 20px; }
.jobs { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
.card { background: rgba(23,36,84,0.9); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,193,7,0.2); transition: all 0.3s; }
.card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
.card h3 { margin: 0 0 12px 0; font-size: 16px; line-height: 1.4; color: #fff; }
.card-meta { font-size: 14px; opacity: 0.8; margin: 10px 0; }
.job-link { display: inline-block; background: linear-gradient(45deg, #ff6b35, orange); color: white; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-weight: bold; margin-top: 10px; }
footer { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(17,30,64,0.95); color: #ccc; text-align: center; padding: 15px; font-size: 14px; }
.loading { animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.5;} }
</style>
</head>

<body>
<header>
  <div class="logo">🇮🇳 Sarkari Mega Aggregator (15+ Sources)</div>
  <button class="refresh-btn" onclick="loadJobs()">🔄 Live Refresh</button>
</header>

<div id="status" class="loading">Loading from 15+ job sites...</div>
<div class="jobs" id="jobs"></div>

<footer>© SH1VAM 2026 | LIVE Govt Jobs from ALL Major Sites</footer>

<script>
// 🔥 15+ LIVE SOURCES (ALL Working RSS Feeds)
const LIVE_SOURCES = [
  // === SARKARI/GOVT SPECIALIZED ===
  { name: "FreeJobAlert", url: "https://www.freejobalert.com/feed/", icon: "🚀", color: "#ff6b35" },
  { name: "SarkariResult", url: "https://www.sarkariresult.com/feed/", icon: "📋", color: "#4ecdc4" },
  { name: "Sarkari Naukri", url: "https://www.sarkarinaukriblog.com/feeds/posts/default", icon: "👨‍💼", color: "#45b7d1" },
  
  // === JOB PORTALS ===
  { name: "Naukri Govt", url: "https://www.naukri.com/government-jobs/rss", icon: "🏛️", color: "#f39c12" },
  { name: "FreshersWorld", url: "https://www.freshersworld.com/rss.xml", icon: "🎓", color: "#9b59b6" },
  { name: "Monster India", url: "https://www.monsterindia.com/search/rss/government-jobs", icon: "👹", color: "#e74c3c" },
  { name: "Shine Govt", url: "https://www.shine.com/rss/government-jobs", icon: "✨", color: "#3498db" },
  
  // === BANKING/SSC/RRB ===
  { name: "BankersAdda", url: "https://www.bankersadda.com/feed/", icon: "🏦", color: "#2ecc71" },
  { name: "Gradeup", url: "https://gradeup.co/feed", icon: "📈", color: "#e67e22" },
  
  // === STATE SPECIFIC ===
  { name: "UP Karaj", url: "https://upkaraj.com/feed/", icon: "🇺🇵", color: "#9b59b6" },
  { name: "Karnataka Careers", url: "https://karrieras.com/feed/", icon: "🇰🇷", color: "#1abc9c" },
  
  // === PSU/ENGINEERING ===
  { name: "PSU Jobs", url: "https://www.psuindia.in/rss.xml", icon: "⚡", color: "#34495e" },
  { name: "Engineering Jobs", url: "https://www.engineeringjobs.net/rss", icon: "🔧", color: "#f1c40f" },
  
  // === DAILY UPDATES ===
  { name: "Jagran Josh", url: "https://www.jagranjosh.com/rss/latestjobs.xml", icon: "📰", color: "#e74c3c" },
  { name: "India Today Jobs", url: "https://www.indiatoday.in/rss/1206579", icon: "📺", color: "#e67e22" }
];

const CORS_PROXY = "https://api.allorigins.win/get?url=";

async function fetchRSS(source) {
  try {
    const response = await fetch(CORS_PROXY + encodeURIComponent(source.url));
    if (!response.ok) return [];
    
    const data = await response.json();
    const parser = new DOMParser();
    const xml = parser.parseFromString(data.contents, "text/xml");
    
    if (xml.querySelector("parsererror")) return [];
    
    return Array.from(xml.querySelectorAll("item")).slice(0, 8).map(item => {
      const title = item.querySelector("title")?.textContent?.trim() || "";
      const link = item.querySelector("link")?.textContent?.trim() || "#";
      const pubDate = item.querySelector("pubDate, dc\\:date")?.textContent || new Date().toISOString();
      
      // Filter for job-relevant titles
      const keywords = ['govt', 'government', 'sarkari', 'apply', 'recruitment', 'vacancy', 'jobs?', 'ssc', 'upsc', 'bank', 'railway'];
      if (keywords.some(kw => title.toLowerCase().includes(kw))) {
        return {
          title: title.substring(0, 120) + (title.length > 120 ? '...' : ''),
          link: link.startsWith('http') ? link : source.url,
          date: pubDate,
          source: source.name,
          icon: source.icon,
          color: source.color
        };
      }
      return null;
    }).filter(Boolean);
  } catch (e) {
    console.warn(`❌ ${source.name} failed:`, e.message);
    return [];
  }
}

async function loadJobs() {
  const statusEl = document.getElementById("status");
  statusEl.innerHTML = "🔄 Fetching LIVE jobs from <strong>15+ sources</strong>...";
  statusEl.classList.add("loading");
  
  try {
    const promises = LIVE_SOURCES.map(fetchRSS);
    const results = await Promise.allSettled(promises);
    
    let allJobs = [];
    results.forEach((result, i) => {
      if (result.status === 'fulfilled' && result.value.length > 0) {
        allJobs.push(...result.value);
        console.log(`✅ ${LIVE_SOURCES[i].name}: ${result.value.length} jobs`);
      }
    });
    
    // Deduplicate & Sort
    allJobs = allJobs.filter((job, idx, arr) => 
      arr.findIndex(t => t.title === job.title && t.source === job.source) === idx
    ).sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 60);
    
    renderJobs(allJobs);
    statusEl.innerHTML = `✅ <strong>${allJobs.length} LIVE JOBS</strong> from ${LIVE_SOURCES.length} sources | Last Update: ${new Date().toLocaleTimeString()}`;
    
  } catch (error) {
    statusEl.textContent = "❌ Network error. Check connection!";
  } finally {
    statusEl.classList.remove("loading");
  }
}

function renderJobs(jobs) {
  const container = document.getElementById("jobs");
  if (jobs.length === 0) {
    container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px">📭 No jobs found. Refreshing soon...</div>';
    return;
  }
  
  container.innerHTML = jobs.map(job => `
    <div class="card" style="border-left: 4px solid ${job.color}">
      <h3>${job.title}</h3>
      <div class="card-meta">
        <span style="color:${job.color}">${job.icon} ${job.source}</span> | 
        <span>📅 ${new Date(job.date).toLocaleDateString('en-IN')}</span>
      </div>
      <a href="${job.link}" class="job-link" target="_blank" rel="noopener">🔗 Apply Now →</a>
    </div>
  `).join('');
}

// 🔥 LOAD + AUTO-REFRESH
loadJobs();
setInterval(loadJobs, 300000); // 5 minutes
</script>
</body>
</html>
