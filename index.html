<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SarkariAlert 2026 - 100+ Live Jobs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0c1730; color: #fff; padding-bottom: 80px; }
        
        header { 
            padding: 20px; background: #111e40; display: flex; 
            justify-content: space-between; align-items: center;
            border-bottom: 2px solid gold; position: sticky; top: 0; z-index: 1000;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* Refresh & Counter */
        .header-tools { display: flex; align-items: center; gap: 15px; }
        .job-count-badge { background: gold; color: #000; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        
        .refresh-btn { 
            background: #1a3a6e; color: white; border: 1px solid gold; 
            padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: 0.3s;
        }
        .refresh-btn:hover { background: gold; color: #000; }

        /* Status Section */
        .source-status { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; justify-content: center; }
        .badge { font-size: 11px; padding: 4px 10px; border-radius: 4px; background: #172454; border: 1px solid #264d8e; }
        .badge.ok { color: #4caf50; }
        .badge.loading { color: orange; }

        /* Grid Layout */
        .jobs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        .card { 
            background: #172454; padding: 20px; border-radius: 12px; 
            border-top: 4px solid gold; transition: 0.3s; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .card:hover { transform: translateY(-5px); background: #1e2d66; }
        .card h3 { font-size: 15px; margin-bottom: 12px; color: #fff; line-height: 1.4; }
        .card .meta { font-size: 12px; color: #8899cc; margin-bottom: 15px; }
        
        .view-link { 
            text-align: center; background: gold; color: #000; 
            padding: 10px; border-radius: 6px; text-decoration: none; 
            font-weight: bold; font-size: 13px;
        }

        footer { position: fixed; bottom: 0; width: 100%; background: #111e40; padding: 15px; text-align: center; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

<header>
    <h2>🇮🇳 SarkariAlert</h2>
    <div class="header-tools">
        <div class="job-count-badge" id="total-count">0 Jobs</div>
        <button class="refresh-btn" onclick="loadJobs()"><i class="fa fa-sync"></i> Refresh</button>
    </div>
</header>

<div class="container">
    <div class="source-status" id="source-status"></div>
    <div class="jobs-grid" id="jobs">
        </div>
</div>

<div style="text-align:center; padding: 40px; opacity: 0.6;">
    <p>Data provided by @SHIVAM Job-Engine v2.0</p>
    <p>Contact: shivamkumarhub@gmail.com</p>
</div>

<footer>© 2026 SarkariAlert — All India Govt Job Aggregator</footer>

<script>
// Logic to get 100+ jobs: 
// 1. Combine 6 reliable sources.
// 2. Use the 'count=50' parameter (rss2json allows up to 50 on some feeds).
const RSS2JSON = "https://api.rss2json.com/v1/api.json?rss_url=";

const SOURCES = [
    { name: "FreeJobAlert", url: "https://www.freejobalert.com/feed/" },
    { name: "SarkariResult", url: "https://www.sarkariresult.com/feed/" },
    { name: "IndGovtJobs", url: "https://www.indgovtjobs.in/feeds/posts/default?alt=rss" },
    { name: "SarkariNaukri", url: "https://www.sarkarinaukriblog.com/feed/" },
    { name: "EmploymentNews", url: "https://employmentnews.gov.in/RSS_Feed.aspx" },
    { name: "RojgarResult", url: "https://www.rojgarresult.com/feed/" }
];

let allJobs = [];

function setBadge(name, state) {
    const id = "badge-" + name.replace(/\s/g,"_");
    let el = document.getElementById(id);
    if (!el) {
        el = document.createElement("span");
        el.id = id;
        document.getElementById("source-status").appendChild(el);
    }
    el.className = "badge " + state;
    el.textContent = (state === 'loading' ? '⏳ ' : '✅ ') + name;
}

async function fetchSource(source) {
    setBadge(source.name, "loading");
    try {
        // Requesting 50 items per source to ensure we hit 100+ total
        const res = await fetch(`${RSS2JSON}${encodeURIComponent(source.url)}&count=50`);
        const data = await res.json();
        if (data.status !== "ok") throw new Error();
        
        setBadge(source.name, "ok");
        return data.items.map(item => ({
            title: item.title,
            source: source.name,
            date: item.pubDate,
            link: item.link
        }));
    } catch (e) {
        setBadge(source.name, "err");
        return [];
    }
}

async function loadJobs() {
    allJobs = [];
    document.getElementById("jobs").innerHTML = "<p style='grid-column:1/-1; text-align:center;'>Fetching 100+ latest jobs...</p>";
    
    // Fetch all sources in parallel
    const results = await Promise.all(SOURCES.map(s => fetchSource(s)));
    results.forEach(batch => allJobs.push(...batch));

    // Remove duplicates (by title)
    allJobs = Array.from(new Set(allJobs.map(a => a.title)))
        .map(title => allJobs.find(a => a.title === title));

    // Sort by Date
    allJobs.sort((a, b) => new Date(b.date) - new Date(a.date));

    document.getElementById("total-count").textContent = allJobs.length + " Jobs Found";
    
    renderJobs(allJobs);
}

function renderJobs(list) {
    const container = document.getElementById("jobs");
    container.innerHTML = list.map(job => `
        <div class="card">
            <div>
                <h3>${job.title}</h3>
                <div class="meta">
                    <p><i class="fa fa-university"></i> ${job.source}</p>
                    <p><i class="fa fa-calendar-check"></i> ${new Date(job.date).toDateString()}</p>
                </div>
            </div>
            <a href="${job.link}" target="_blank" class="view-link">Apply Now <i class="fa fa-arrow-right"></i></a>
        </div>
    `).join("");
}

window.onload = loadJobs;
</script>
</body>
</html>
