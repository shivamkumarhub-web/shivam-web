<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarkari Jobs - Multi-Source Fixed</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0f1e; color: white; margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1e293b; padding-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #161e31; padding: 15px; border-radius: 8px; border-top: 4px solid gold; }
        .card h3 { font-size: 1rem; margin: 0 0 10px 0; color: #facc15; }
        .tag { background: #1e293b; font-size: 0.7rem; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; }
        .status { color: #94a3b8; text-align: center; margin: 10px; font-weight: bold; }
        a { display: inline-block; margin-top: 10px; color: white; background: #3b82f6; padding: 8px 12px; border-radius: 5px; text-decoration: none; font-size: 0.9rem; }
        button { background: gold; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h2>🇮🇳 Sarkari Alert (Fixed)</h2>
    <button onclick="loadAll()">Refresh Live Jobs</button>
</header>

<div id="status" class="status">Click Refresh to start fetching...</div>
<div id="jobs" class="grid"></div>

<script>
    // Multiple proxies in case one fails
    const PROXIES = [
        "https://allorigins.win",
        "https://corsproxy.io?"
    ];

    const SOURCES = [
        { name: "Jagran Josh", url: "https://jagranjosh.com" },
        { name: "Career India", url: "https://www.careerindia.com/rss/feeds/careerindia-fb.xml" },
        { name: "FreeJobAlert", url: "https://freejobalert.com" }
    ];

    async function fetchWithRetry(source, proxyIdx = 0) {
        if (proxyIdx >= PROXIES.length) return []; // All proxies failed
        
        try {
            const finalUrl = PROXIES[proxyIdx] + encodeURIComponent(source.url);
            const res = await fetch(finalUrl);
            const data = await res.json();
            
            // Handle different proxy response formats
            const content = data.contents || data; // allorigins uses .contents
            const parser = new DOMParser();
            const xml = parser.parseFromString(content, "text/xml");
            const items = xml.querySelectorAll("item");

            return Array.from(items).slice(0, 10).map(item => ({
                title: item.querySelector("title").textContent,
                link: item.querySelector("link").textContent,
                source: source.name,
                date: item.querySelector("pubDate")?.textContent || "Recently"
            }));
        } catch (e) {
            console.log(`Proxy ${proxyIdx} failed for ${source.name}, trying next...`);
            return fetchWithRetry(source, proxyIdx + 1);
        }
    }

    async function loadAll() {
        const btn = document.querySelector('button');
        const status = document.getElementById("status");
        const container = document.getElementById("jobs");

        btn.disabled = true;
        status.innerText = "🔍 Searching multiple websites...";
        container.innerHTML = "";

        const allPromises = SOURCES.map(s => fetchWithRetry(s));
        const results = await Promise.all(allPromises);
        const combined = results.flat();

        if (combined.length === 0) {
            status.innerText = "❌ Connection Error. Please check your internet or try again later.";
        } else {
            status.innerText = `✅ Found ${combined.length} jobs!`;
            combined.forEach(job => {
                container.innerHTML += `
                    <div class="card">
                        <span class="tag">${job.source}</span>
                        <h3>${job.title}</h3>
                        <small>📅 ${job.date}</small><br>
                        <a href="${job.link}" target="_blank">Apply Now →</a>
                    </div>
                `;
            });
        }
        btn.disabled = false;
    }

    // Auto-load on start
    window.onload = loadAll;
</script>
</body>
</html>
